<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>RL Agent Tutor</title>
<style>
:root { color-scheme: light; --pri:#1f6feb; --bg:#f6f7f9; --card:#fff; --bd:#e3e5e8; --txt:#1f2328; --mut:#6a737d; --ok:#1a7f37; --warn:#d97706; --danger:#cf222e; --focus:#fa8c16; }
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC",sans-serif;background:var(--bg);color:var(--txt);font-size:14px;line-height:1.6}
.app{max-width:1180px;margin:0 auto;padding:18px 16px 60px}
header{display:flex;justify-content:space-between;align-items:flex-end;gap:12px;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid var(--bd)}
h1{font-size:18px;font-weight:700}
.sub{font-size:12px;color:var(--mut)}
.btn{background:var(--card);border:1px solid var(--bd);padding:6px 12px;border-radius:6px;cursor:pointer;font-size:12px;color:var(--txt)}
.btn:hover{background:#f0f3f6}
.btn.primary{background:var(--pri);color:#fff;border-color:var(--pri)}
.btn.primary:hover{background:#1858c4}
.btn.danger:hover{background:#fdf2f2;border-color:var(--danger);color:var(--danger)}
.btn[disabled]{opacity:.5;cursor:not-allowed}
.tabs{display:flex;gap:2px;background:var(--card);border:1px solid var(--bd);border-radius:8px;padding:4px;margin-bottom:14px;overflow-x:auto}
.tab{padding:7px 14px;cursor:pointer;border-radius:6px;font-size:13px;color:var(--mut);white-space:nowrap}
.tab.active{background:var(--pri);color:#fff}
.view{display:none}.view.active{display:block}
.row{display:grid;grid-template-columns:280px 1fr;gap:14px}
@media (max-width:880px){.row{grid-template-columns:1fr}}
.card{background:var(--card);border:1px solid var(--bd);border-radius:10px;padding:14px 16px;margin-bottom:12px}
.card h3{font-size:13px;font-weight:600;color:var(--mut);margin-bottom:8px}
.stage{margin-bottom:10px}
.stage-name{font-weight:600;font-size:13px;margin-bottom:4px;display:flex;justify-content:space-between}
.stage-name .pct{font-size:11px;color:var(--mut)}
.node{padding:5px 8px;border-radius:5px;cursor:pointer;font-size:12px;display:flex;align-items:center;gap:6px}
.node:hover{background:#f0f3f6}
.node.cur{background:#ddf4ff;color:#0969da;font-weight:600}
.node .id{font-family:ui-monospace,monospace;color:var(--mut);font-size:11px}
.node .icon{width:14px;text-align:center}
.empty{padding:30px;text-align:center;color:var(--mut)}
.toolbar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
textarea,input{width:100%;padding:8px 10px;border:1px solid var(--bd);border-radius:6px;font:inherit;font-size:13px}
textarea{resize:vertical;font-family:inherit}
.qa-msg{padding:10px 12px;border-radius:6px;margin:8px 0;font-size:13px;line-height:1.7;white-space:pre-wrap}
.qa-msg.user{background:#ddf4ff;color:#0969da}
.qa-msg.ai{background:#fafbfc;border:1px solid var(--bd)}
.spinner{display:inline-block;width:12px;height:12px;border:2px solid #ddd;border-top-color:var(--pri);border-radius:50%;animation:spin .8s linear infinite;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
.kb pre{background:#1f2328;color:#f0f3f6;padding:10px;border-radius:5px;overflow-x:auto;font-size:12px}
.kb pre code{background:transparent;color:inherit;padding:0;font-size:inherit}
.kb code{background:#eef0f2;color:#1f2328;padding:1px 5px;border-radius:3px;font-size:12px}
.kb h1{font-size:18px;margin:14px 0 8px}.kb h2{font-size:15px;margin:12px 0 6px;border-bottom:1px solid var(--bd);padding-bottom:4px}.kb h3{font-size:13px;margin:8px 0 4px}.kb h4{font-size:12px;margin:6px 0 4px}.kb ul,.kb ol{padding-left:22px;margin:4px 0}.kb li{margin:2px 0}.kb a{color:var(--pri)}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:12px}
.stat-card{background:var(--card);border:1px solid var(--bd);border-radius:8px;padding:12px}
.stat-label{font-size:10px;color:var(--mut);text-transform:uppercase;letter-spacing:.5px}
.stat-value{font-size:22px;font-weight:700;margin-top:4px}
.heat{display:grid;grid-template-columns:repeat(53,11px);gap:2px;padding:4px 0;overflow-x:auto}
.hc{width:11px;height:11px;border-radius:2px;background:#ebedf0}
.hc.l1{background:#9be9a8}.hc.l2{background:#40c463}.hc.l3{background:#30a14e}.hc.l4{background:#216e39}
.test-q{padding:14px;background:var(--card);border:1px solid var(--bd);border-radius:8px;margin-bottom:10px}
.test-q .qhead{font-weight:600;margin-bottom:8px}
.test-q .qtype{font-size:10px;background:#f0f3f6;padding:2px 6px;border-radius:3px;margin-right:6px}
.feedback{margin-top:10px;padding:10px 12px;border-radius:6px;font-size:12px}
.feedback.ok{background:#dafbe1;color:#1a7f37}
.feedback.warn{background:#fff8c5;color:#5d4e00}
.feedback.bad{background:#ffebe9;color:var(--danger)}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(80px);background:#1f2328;color:#fff;padding:8px 16px;border-radius:6px;font-size:12px;opacity:0;transition:all .3s;z-index:99}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.process-panel{background:var(--card);border:1px solid var(--bd);border-left:4px solid var(--pri);border-radius:8px;padding:12px 14px;margin-bottom:14px}
.process-head{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;margin-bottom:10px}
.process-head h3{font-size:13px;color:var(--mut);font-weight:600;margin-bottom:2px}
.process-title{font-size:13px;font-weight:600}
.process-elapsed{font-family:ui-monospace,monospace;font-size:12px;color:var(--mut);white-space:nowrap}
.process-steps{display:grid;gap:6px}
.process-step{display:grid;grid-template-columns:18px 1fr;gap:8px;align-items:flex-start;padding:7px 8px;border:1px solid var(--bd);border-radius:6px;background:#fff;font-size:12px;color:var(--mut)}
.process-step .mark{width:18px;height:18px;border-radius:50%;border:1px solid var(--bd);display:flex;align-items:center;justify-content:center;font-size:10px;background:#f6f8fa;color:var(--mut);line-height:1}
.process-step strong{display:block;color:var(--txt);font-size:12px;font-weight:600}
.process-step .detail{font-size:11px;color:var(--mut);margin-top:1px}
.process-step.active{border-color:#b6d7ff;background:#f6fbff}
.process-step.active .mark{border-color:var(--pri);background:#ddf4ff;color:var(--pri)}
.process-step.done{border-color:#b7e4c7;background:#f6fff8}
.process-step.done .mark{border-color:var(--ok);background:#dafbe1;color:var(--ok)}
.process-step.error{border-color:#ffb4ad;background:#fff7f6}
.process-step.error .mark{border-color:var(--danger);background:#ffebe9;color:var(--danger)}
.process-tip{margin-top:8px;font-size:12px;color:var(--mut)}
.res{padding:8px 0;border-bottom:1px dashed var(--bd);font-size:12px}
.res:last-child{border-bottom:none}
.res .kind{font-size:10px;background:var(--pri);color:#fff;padding:1px 6px;border-radius:3px;margin-right:6px}
.res .title{font-weight:500}
.res .meta{color:var(--mut);font-size:11px;margin-top:2px}
.dot-state{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--mut);margin-right:6px}
.dot-state.studying{background:var(--pri)}.dot-state.self_testing{background:#a371f7}.dot-state.advancing{background:var(--ok)}.dot-state.done{background:var(--ok)}
.courseware h2{font-size:17px;margin:0 0 10px}
.cw-objectives{background:#f6f8fa;border:1px solid var(--bd);border-radius:8px;padding:10px 12px;margin-bottom:12px}
.cw-section{border-top:1px solid var(--bd);padding-top:12px;margin-top:14px}
.cw-section h3{font-size:15px;color:var(--txt);margin-bottom:8px}
.cw-section h4{font-size:13px;color:var(--txt);margin-bottom:6px}
.cw-block{background:#fff;border:1px solid var(--bd);border-radius:8px;padding:10px 12px;margin:8px 0;overflow:hidden}
.cw-block.callout{border-left:4px solid var(--focus);background:#fff8f0}
.cw-block.quiz{border-left:4px solid var(--pri);background:#f6fbff}
.cw-block.video{border-left:4px solid #8250df;background:#fbfaff}
.cw-block.diagram{background:#f8fafc}
.cw-block.table{overflow-x:auto}
.cw-block table{width:100%;border-collapse:collapse;font-size:12px}
.cw-block th,.cw-block td{border:1px solid var(--bd);padding:6px 8px;text-align:left;vertical-align:top}
.cw-block th{background:#f6f8fa;font-weight:600}
.cw-formula{font-family:ui-monospace,monospace;background:#1f2328;color:#f0f3f6;border-radius:6px;padding:10px;overflow-x:auto}
.cw-diagram-label{display:inline-block;font-size:10px;background:#eaeef2;color:#57606a;border-radius:4px;padding:1px 6px;margin-bottom:6px;text-transform:uppercase}
.cw-video-frame{position:relative;width:100%;aspect-ratio:16/9;background:#1f2328;border-radius:8px;overflow:hidden;margin:8px 0}
.cw-video-frame iframe{position:absolute;inset:0;width:100%;height:100%;border:0}
.cw-video-summary{margin:6px 0}
.cw-segments{display:grid;gap:6px;margin-top:8px}
.cw-segment{background:#fff;border:1px solid var(--bd);border-radius:6px;padding:8px 10px;font-size:12px}
.cw-checkpoint{margin-top:5px;color:#0969da}
.coach-card{border-left:4px solid var(--pri);background:#fbfdff}
.coach-label{font-size:16px;font-weight:700;color:var(--txt);margin-bottom:4px}
.coach-reason{font-size:13px;color:var(--mut)}
.metric-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px}
.metric{border:1px solid var(--bd);border-radius:8px;padding:10px 12px;background:#fff}
.metric span{display:block;font-size:11px;color:var(--mut);margin-bottom:4px}
.metric strong{font-size:20px}

</style>
</head>
<body>
<div class="app">

<header>
  <div>
    <h1>RL Agent Tutor</h1>
    <div class="sub" id="metaLine">Loading…</div>
  </div>
  <div style="display:flex;gap:8px;align-items:center">
    <select id="wsSelect" onchange="onWsChange()" title="当前学习工作区"
            style="padding:6px 10px;border:1px solid var(--bd);border-radius:6px;background:var(--card);font-size:12px"></select>
    <button class="btn" onclick="openNewWs()" title="新建一个独立的学习任务">+ 新任务</button>
    <button class="btn" onclick="refreshAll()">🔄 刷新</button>
  </div>
</header>

<div class="modal-bg" id="newWsModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:99;align-items:center;justify-content:center">
  <div class="card" style="max-width:420px;width:90%;margin:0">
    <h3 style="margin-bottom:8px">新建学习任务</h3>
    <div class="sub" style="margin-bottom:10px">每个任务有独立的计划、问答、知识库、归档。互不干扰。</div>
    <input id="newWsName" placeholder="任务标识(英文小写,如 rust-async, system-design)" style="margin-bottom:8px"/>
    <div class="sub" style="font-size:11px;margin-bottom:8px">只允许 a-z、0-9、_、-,最多 40 字符</div>
    <div style="display:flex;gap:6px;justify-content:flex-end">
      <button class="btn" onclick="closeNewWs()">取消</button>
      <button class="btn primary" onclick="confirmNewWs()">创建并切换</button>
    </div>
  </div>
</div>

<div id="noPlan" style="display:none">
  <div class="card">
    <h3>开始一个学习计划</h3>
    <input id="goal" placeholder="学习目标,如:掌握 PPO 并能用 TRL 跑通 RLHF" style="margin-bottom:8px"/>
    <input id="level" placeholder="当前水平(可选)"/>
    <div style="margin-top:10px"><button class="btn primary" onclick="createPlan()">生成计划</button></div>
  </div>
</div>

<div class="process-panel" id="processPanel" style="display:none" aria-live="polite">
  <div class="process-head">
    <div>
      <h3>执行过程</h3>
      <div id="processTitle" class="process-title"></div>
    </div>
    <div id="processElapsed" class="process-elapsed">0s</div>
  </div>
  <div id="processSteps" class="process-steps"></div>
  <div id="processTip" class="process-tip"></div>
</div>

<div id="hasPlan" style="display:none">
  <div class="tabs">
    <div class="tab active" data-v="study">学习</div>
    <div class="tab" data-v="resources">资源</div>
    <div class="tab" data-v="sources">资源源</div>
    <div class="tab" data-v="kb">知识库</div>
    <div class="tab" data-v="test">自测</div>
    <div class="tab" data-v="dashboard">看板</div>
    <div class="tab" data-v="review">复盘</div>
    <div class="tab" data-v="library">📚 RAG</div>
  </div>

  <div id="v-study" class="view active">
    <div class="row">
      <div>
        <div class="card">
          <h3>学习路径</h3>
          <div id="planTree"></div>
        </div>
        <div class="card">
          <h3>下一步建议</h3>
          <div id="nextAction" class="sub" style="white-space:pre-wrap"></div>
        </div>
      </div>
      <div>
        <div class="card coach-card" id="coachCard" style="display:none">
          <h3>今日任务</h3>
          <div id="coachReason" class="coach-reason"></div>
          <div class="toolbar" style="margin-top:10px">
            <button class="btn primary" id="coachActionBtn" onclick="runRecommendedAction()">执行下一步</button>
          </div>
        </div>
        <div class="card">
          <h3 id="curHead">当前节点</h3>
          <div id="curBody"></div>
          <div class="toolbar" style="margin-top:10px">
            <button class="btn primary" onclick="doFetch()">📚 抓资源</button>
            <button class="btn" onclick="doCourseware()">📖 生成课件</button>
            <button class="btn" onclick="doPractices()">⭐ 行业实践</button>
            <button class="btn" onclick="setView('test');startTest()">🧪 开始自测</button>
            <button class="btn" onclick="doArchive()">📝 归档为KB</button>
            <button class="btn" onclick="doAdvance()">➡️ 完成并推进</button>
          </div>
        </div>
        <div class="card" id="inlineResourcesCard" style="display:none">
          <h3 style="display:flex;justify-content:space-between;align-items:center">
            <span>📚 本节点资源 <span id="inlineResourcesCount" class="sub" style="font-weight:normal;font-size:12px"></span></span>
            <span style="display:flex;gap:10px;align-items:center;font-weight:normal;font-size:12px">
              <span style="cursor:pointer;color:var(--mut)" onclick="doFetch()" title="重新抓取资源">🔄 重新抓取</span>
              <span style="cursor:pointer;color:var(--mut)" onclick="document.getElementById('inlineResourcesCard').style.display='none'">收起 ✕</span>
            </span>
          </h3>
          <div id="inlineResourcesList"></div>
        </div>
        <div class="card" id="inlineResCard" style="display:none">
          <h3 style="display:flex;justify-content:space-between;align-items:center">
            <span>📖 学习课件 <span id="inlineResCount" class="sub" style="font-weight:normal;font-size:12px"></span></span>
            <span style="display:flex;gap:10px;align-items:center;font-weight:normal;font-size:12px">
              <span style="cursor:pointer;color:var(--mut)" onclick="regenCourseware()" title="基于当前已抓资源重新生成">🔄 重新生成</span>
              <span style="cursor:pointer;color:var(--mut)" onclick="exportCourseware()" title="导出 Markdown / HTML / PDF">导出</span>
              <span style="cursor:pointer;color:var(--mut)" onclick="document.getElementById('inlineResCard').style.display='none'">收起 ✕</span>
            </span>
          </h3>
          <div id="inlineResList" class="kb"></div>
        </div>
        <div class="card" id="practiceCard" style="display:none">
          <h3 style="display:flex;justify-content:space-between;align-items:center">
            <span>⭐ 行业实践</span>
            <span style="cursor:pointer;color:var(--mut);font-weight:normal;font-size:12px" onclick="document.getElementById('practiceCard').style.display='none'">收起 ✕</span>
          </h3>
          <div id="practiceContent" class="kb"></div>
        </div>
        <div class="card">
          <h3>问 Tutor</h3>
          <div id="qaHistory"></div>
          <select id="qaMode" style="margin-bottom:8px">
            <option value="explain">解释概念</option>
            <option value="check_understanding">检查我的理解</option>
            <option value="advance_task">帮我推进任务</option>
          </select>
          <textarea id="qaInput" rows="3" placeholder="向 tutor 提问,自动带节点上下文"></textarea>
          <div style="margin-top:8px"><button class="btn primary" onclick="doAsk()" id="askBtn">提问</button></div>
        </div>
      </div>
    </div>
  </div>

  <div id="v-resources" class="view">
    <div class="card">
      <h3>当前节点资源</h3>
      <div class="toolbar"><button class="btn primary" onclick="doFetch()">🔄 重新抓取</button></div>
      <div id="resList"></div>
    </div>
  </div>

  <div id="v-sources" class="view">
    <div class="card">
      <h3>资源源配置</h3>
      <div class="toolbar">
        <button class="btn primary" onclick="saveSources()">保存配置</button>
        <button class="btn" onclick="loadSources()">重新加载</button>
        <button class="btn" onclick="addSourceRow()">新增自定义源</button>
      </div>
      <div id="sourcesList"></div>
    </div>
  </div>

  <div id="v-kb" class="view">
    <div class="card">
      <h3>知识库</h3>
      <div class="toolbar">
        <button class="btn" onclick="loadKbIndex()">总览索引</button>
        <button class="btn" onclick="loadKbNode()">当前节点</button>
        <button class="btn primary" onclick="doArchive()">📝 归档当前节点</button>
        <button class="btn" onclick="doArchiveAll()">📝 归档所有有活动的节点</button>
      </div>
      <div id="kbContent" class="kb"></div>
    </div>
  </div>

  <div id="v-test" class="view">
    <div class="card">
      <h3>自测</h3>
      <div class="toolbar">
        <button class="btn primary" onclick="startTest()">🎯 出 5 题</button>
      </div>
      <div id="testArea"></div>
    </div>
  </div>

  <div id="v-dashboard" class="view">
    <div class="stat-grid" id="statGrid"></div>
    <div class="card"><h3>能力状态</h3><div id="masteryPanel"></div></div>
    <div class="card"><h3>薄弱维度</h3><div id="weakAreasList"></div></div>
    <div class="card"><h3>薄弱节点</h3><div id="weakNodesList"></div></div>
    <div class="card"><h3>近 53 周活动热力</h3><div class="heat" id="heatmap"></div></div>
    <div class="card"><h3>近期自测分</h3><div id="scoresList"></div></div>
  </div>

  <div id="v-review" class="view">
    <div class="card">
      <h3>复盘</h3>
      <div class="toolbar">
        <button class="btn primary" onclick="genWeekly()">📅 生成周复盘</button>
        <button class="btn" onclick="applyWeekly()">应用复盘建议</button>
      </div>
      <div id="reviewContent" class="kb"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
<script>
let state={plan:null,stats:null,test:null,recommendedAction:null,sources:[]};
let processState={timer:null,startedAt:0,title:'',steps:[],tips:[],finished:false};

async function api(method,path,body){
  const opt={method,headers:{'Content-Type':'application/json'}};
  if(body) opt.body=JSON.stringify(body);
  const r=await fetch(path,opt);
  if(!r.ok){
    const text=await r.text();
    let detail=text;
    try{detail=JSON.parse(text).detail||text}catch(_){}
    const message=typeof detail==='object'?(detail.message||JSON.stringify(detail)):detail;
    const err=new Error(message);
    err.status=r.status;
    err.detail=detail;
    throw err;
  }
  return await r.json();
}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1800)}
function escapeHtml(s){return (s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
function startProcess(title, steps, tips=[]){
  clearProcessTimer();
  processState={timer:null,startedAt:Date.now(),title,steps:steps.map(s=>({label:s,detail:'',status:'pending'})),tips,finished:false};
  setProcessStep(0,'active');
  const panel=document.getElementById('processPanel');
  if(panel){panel.style.display='block';panel.scrollIntoView({behavior:'smooth',block:'nearest'})}
  processState.timer=setInterval(renderProcess,1000);
  renderProcess();
}
function clearProcessTimer(){
  if(processState.timer){clearInterval(processState.timer);processState.timer=null}
}
function setProcessStep(index,status='active',detail=''){
  if(!processState.steps.length)return;
  processState.steps=processState.steps.map((s,i)=>{
    if(i<index&&s.status!=='error')return {...s,status:'done'};
    if(i===index)return {...s,status,detail:detail||s.detail};
    return s;
  });
  renderProcess();
}
function finishProcess(message='已完成'){
  if(!processState.steps.length)return;
  processState.steps=processState.steps.map(s=>s.status==='error'?s:{...s,status:'done'});
  processState.finished=true;
  clearProcessTimer();
  const tip=document.getElementById('processTip');
  if(tip)tip.textContent=message;
  renderProcess();
}
function failProcess(message){
  if(!processState.steps.length)return;
  const active=processState.steps.findIndex(s=>s.status==='active');
  setProcessStep(active>=0?active:processState.steps.length-1,'error',message);
  processState.finished=true;
  clearProcessTimer();
  const tip=document.getElementById('processTip');
  if(tip)tip.textContent='失败: '+message;
}
function renderProcess(){
  const panel=document.getElementById('processPanel');
  if(!panel||!processState.steps.length)return;
  const elapsed=Math.max(0,Math.floor((Date.now()-processState.startedAt)/1000));
  const title=document.getElementById('processTitle');
  const time=document.getElementById('processElapsed');
  const steps=document.getElementById('processSteps');
  const tip=document.getElementById('processTip');
  if(title)title.textContent=processState.title;
  if(time)time.textContent=elapsed+'s';
  if(steps){
    steps.innerHTML=processState.steps.map((s,i)=>{
      const mark=s.status==='done'?'✓':s.status==='error'?'!':(i+1);
      return `<div class="process-step ${s.status}">
        <div class="mark">${mark}</div>
        <div><strong>${escapeHtml(s.label)}</strong>${s.detail?`<div class="detail">${escapeHtml(s.detail)}</div>`:''}</div>
      </div>`;
    }).join('');
  }
  if(tip&&!processState.finished){
    const matched=[...processState.tips].reverse().find(x=>elapsed>=x.after);
    tip.textContent=matched?matched.text:'正在执行,页面会保留每一步的状态。';
  }
}
function md2html(md){
  let h=escapeHtml(md);
  h=h.replace(/```(\w*)\n([\s\S]*?)```/g,(m,l,c)=>`<pre><code>${c}</code></pre>`);
  h=h.replace(/`([^`\n]+)`/g,'<code>$1</code>');
  h=h.replace(/^####\s+(.+)$/gm,'<h4>$1</h4>');
  h=h.replace(/^###\s+(.+)$/gm,'<h3>$1</h3>');
  h=h.replace(/^##\s+(.+)$/gm,'<h2>$1</h2>');
  h=h.replace(/^#\s+(.+)$/gm,'<h1>$1</h1>');
  h=h.replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>');
  h=h.replace(/\*([^*]+)\*/g,'<em>$1</em>');
  h=h.replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>');
  h=h.replace(/^[-*]\s+(.+)$/gm,'<li>$1</li>');
  h=h.replace(/(<li>[\s\S]*?<\/li>(\n|$))+/g,m=>'<ul>'+m+'</ul>');
  h=h.replace(/\n{2,}/g,'</p><p>');h='<p>'+h+'</p>';
  h=h.replace(/<p>(<h\d|<ul|<pre)/g,'$1').replace(/(<\/h\d>|<\/ul>|<\/pre>)<\/p>/g,'$1');
  return h;
}

  try{
    setProcessStep(0,'done','已准备课件容器');
    setProcessStep(1,'active','正在抽取并综合资源内容');
    const url='/api/courseware'+(force?'?force=true':'');

    setProcessStep(2,'done','结构化课件已返回');
    if(!r.markdown||!r.markdown.trim()){
      body.innerHTML=`<div class="empty">课件生成为空。可能是该节点还没抓到任何可读资源。<br>建议先点"📚 抓资源",或在 workspace/library/papers/ 手动放 PDF 后再试。</div>`;
      cnt.textContent='';
      finishProcess('课件未生成内容,建议先补充或重新抓取资源。');
      return;
    }
    setProcessStep(3,'done','课件产物已写入');
    setProcessStep(4,'active','正在更新课件视图');
    body.innerHTML=r.courseware?renderCourseware(r.courseware):md2html(r.markdown);
    renderMermaidDiagrams(body);
    const meta=[];
    if(typeof r.sources_used==='number'){meta.push(`${r.sources_used}/${r.sources_total||r.sources_used} 资源`)}
    if(r.cached){meta.push('缓存')}
    cnt.textContent=meta.length?`(${meta.join(' · ')})`:'';
    finishProcess(meta.length?`课件已生成: ${meta.join(' · ')}`:'课件已生成。');
  }catch(e){
    failProcess(e.message);
    body.innerHTML='<div class="empty" style="color:var(--danger)">课件生成失败: '+escapeHtml(e.message)+'</div>';
    cnt.textContent='';
  }
}

function renderCourseware(cw){
  const objectives=(cw.learning_objectives||[]).length

    : '';

        <span>${escapeHtml(sec.title||'')}</span>

    ? `<section class="cw-section"><h3>关键结论</h3><ul>${cw.key_takeaways.map(x=>`<li>${escapeHtml(x)}</li>`).join('')}</ul></section>`
    : '';
  return `<div class="courseware"><h2>${escapeHtml(cw.title||'学习课件')}</h2>${objectives}${sections}${takeaways}</div>`;
}

function renderCoursewareBlock(block){
  const c=block.content||{};
  const title=block.title?`<h4>${escapeHtml(block.title)}</h4>`:'';
  if(block.type==='paragraph') return `<div class="cw-block">${title}${md2html(c.markdown||c.text||'')}</div>`;
  if(block.type==='callout') return `<div class="cw-block callout">${title}${escapeHtml(c.text||'')}</div>`;
  if(block.type==='formula') return `<div class="cw-block formula">${title}<div class="cw-formula">${escapeHtml(c.formula||'')}</div><div class="meta">${escapeHtml(c.caption||'')}</div></div>`;
  if(block.type==='code') return `<div class="cw-block code">${title}<pre><code>${escapeHtml(c.code||'')}</code></pre><div class="meta">${escapeHtml(c.caption||'')}</div></div>`;
  if(block.type==='table') return renderCoursewareTable(block);
  if(block.type==='diagram') return renderCoursewareDiagram(block);
  if(block.type==='video') return renderCoursewareVideo(block);
  if(block.type==='quiz') return `<div class="cw-block quiz">${title}<ul>${(c.questions||[]).map(q=>`<li>${escapeHtml(q)}</li>`).join('')}</ul></div>`;
  if(block.type==='image') return `<div class="cw-block image">${title}${coursewareImageSrc(c)?`<img src="${escapeHtml(coursewareImageSrc(c))}" alt="${escapeHtml(c.alt||block.title||'image')}" style="max-width:100%;border:1px solid var(--bd);border-radius:6px">`:''}<div class="meta">${escapeHtml(c.caption||'')}</div></div>`;
  return `<div class="cw-block">${title}${escapeHtml(c.text||c.url||'')}</div>`;
}

function renderCoursewareDiagram(block){
  const c=block.content||{};
  const title=block.title?`<h4>${escapeHtml(block.title)}</h4>`:'';
  const fmt=escapeHtml(c.format||'mermaid');
  if((c.format||'mermaid')==='mermaid'){
    return `<div class="cw-block diagram">${title}<div class="mermaid">${escapeHtml(c.code||'')}</div>${c.caption?`<div class="meta">${escapeHtml(c.caption)}</div>`:''}</div>`;
  }
  return `<div class="cw-block diagram">${title}<div class="cw-diagram-label">${fmt}</div><pre><code>${escapeHtml(c.code||'')}</code></pre>${c.caption?`<div class="meta">${escapeHtml(c.caption)}</div>`:''}</div>`;
}

function renderCoursewareVideo(block){
  const c=block.content||{};
  const title=block.title?`<h4>${escapeHtml(block.title)}</h4>`:'';
  const embed=youtubeEmbedUrl(c.url||'');
  const link=c.url?`<a href="${escapeHtml(c.url)}" target="_blank" rel="noopener">${escapeHtml(c.url)}</a>`:'';
  const frameId='yt_'+Math.random().toString(36).slice(2);
  const media=embed?`<div class="cw-video-frame"><iframe id="${frameId}" src="${escapeHtml(embed)}" title="${escapeHtml(block.title||'video')}" loading="lazy" allowfullscreen></iframe></div>`:'';
  const segments=(c.segments||c.key_segments||[]).map(seg=>renderVideoSegment(seg,embed,frameId)).join('');
  return `<div class="cw-block video">${title}${media}<div class="cw-video-summary">${escapeHtml(c.summary||'')}</div>${link?`<div class="meta">${link}</div>`:''}${segments?`<div class="cw-segments">${segments}</div>`:''}</div>`;
}

function renderVideoSegment(seg,embed,frameId){
  const range=formatSegmentRange(seg);
  const q=seg.checkpoint_question?`<div class="cw-checkpoint">${escapeHtml(seg.checkpoint_question)}</div>`:'';
  const start=typeof seg.start_seconds==='number'?seg.start_seconds:0;
  const click=embed?` onclick="jumpVideoSegment('${frameId}','${escapeHtml(embed)}',${start})"`:'';
  return `<div class="cw-segment"${click}><div><strong>${escapeHtml(range?range+' · '+(seg.title||'片段'):(seg.title||'片段'))}</strong></div><div>${escapeHtml(seg.why_watch||seg.summary||'')}</div>${q}</div>`;
}

function jumpVideoSegment(frameId,embed,start){
  const frame=document.getElementById(frameId);
  if(frame) frame.src=embed+(embed.includes('?')?'&':'?')+'start='+Math.max(0,Math.floor(start||0))+'&autoplay=1';
}

function coursewareImageSrc(c){

function formatSegmentRange(seg){
  const s=typeof seg.start_seconds==='number'?formatSeconds(seg.start_seconds):'';
  const e=typeof seg.end_seconds==='number'?formatSeconds(seg.end_seconds):'';
  return s&&e?`${s}-${e}`:s;
}

function formatSeconds(total){
  total=Math.max(0,Math.floor(total));
  const h=Math.floor(total/3600), m=Math.floor((total%3600)/60), s=total%60;
  return h?`${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`:`${m}:${String(s).padStart(2,'0')}`;
}

function youtubeEmbedUrl(url){
  const text=String(url||'');
  const match=text.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([A-Za-z0-9_-]{11})/);
  return match?`https://www.youtube.com/embed/${match[1]}`:'';
}

}

function renderResourceListInto(list, items){
  if(!items||!items.length){
    list.innerHTML=`<div class="empty">
      没抓到任何资源。可能原因:<br>
      · LLM 没为这个节点想到匹配的论文/仓库(尝试节点描述更具体)<br>
      · 网络中断 / arxiv 临时不可用<br>
      · 见终端日志
    </div>`;
    return;
  }
  list.innerHTML=items.map(x=>{
    const failed=(x.summary||'').toLowerCase().includes('failed') || (x.title||'').startsWith('[search failed');
    const source=x.source_id?` · source:${escapeHtml(x.source_id)}`:'';
    const priority=x.priority&&x.priority!=='normal'?` · ${escapeHtml(x.priority)}`:'';
    const status=x.status?` · ${escapeHtml(x.status)}`:'';
    const used=x.used_by&&x.used_by.length?` · used:${x.used_by.length}`:'';
    return `<div class="res" style="${failed?'opacity:0.55':''}">
    <span class="kind">${x.kind}</span><span class="title">${escapeHtml(x.title)}</span><span class="meta">${source}${priority}${status}${used}</span>
    <div class="meta">${x.local_path?'📁 '+escapeHtml(x.local_path)+'<br>':''}${x.url?'🔗 <a href="'+x.url+'" target="_blank" rel="noopener">'+escapeHtml(x.url)+'</a>':''}</div>

  }).join('');
}

    area.innerHTML=`<div class="card"><h3>本场结果</h3>

    api('POST','/api/test/submit',{node_id:t.node_id,questions:t.questions,attempts:t.attempts}).catch(()=>{});
    return;
  }
  const q=t.questions[t.idx];
  area.innerHTML=`<div class="test-q">
    <div class="qhead">Q${t.idx+1}/${t.questions.length} <span class="qtype">${q.type}</span></div>

async function submitAns(){
  const t=state.test;const q=t.questions[t.idx];const ans=document.getElementById('ansBox').value;
  const fb=document.getElementById('fb');fb.innerHTML='<div class="feedback warn"><span class="spinner"></span> 评分中...</div>';
  try{
    const r=await api('POST','/api/test/grade',{node_id:t.node_id,qid:q.qid,question:q.question,expected_points:q.expected_points,qtype:q.type,answer:ans});
    t.attempts.push(r);
    const cls=r.score>=0.8?'ok':r.score>=0.6?'warn':'bad';
    fb.innerHTML=`<div class="feedback ${cls}"><strong>${r.score.toFixed(2)}</strong><br>${escapeHtml(r.feedback)}</div>
      <div class="toolbar" style="margin-top:6px"><button class="btn primary" onclick="nextQ()">下一题</button></div>`;

function renderMasteryDashboard(d){

  const dims=d.dimension_mastery||{};
  const avg=m.avg_score==null?'—':m.avg_score.toFixed(2);
  panel.innerHTML=`
    <div class="metric-grid">
      <div class="metric"><span>平均自测</span><strong>${avg}</strong></div>
      <div class="metric"><span>掌握节点</span><strong>${m.solid_nodes||0}</strong></div>

          <div class="meta">avg: ${x.avg_score==null?'—':Number(x.avg_score).toFixed(2)} · attempts: ${x.attempts||0} · weak: ${x.weak_count||0}</div>
        </div>
      `).join('')}

  const items=d.weak_nodes||[];
  weak.innerHTML=items.length?items.map(n=>`
    <div class="res">
      <span class="kind">${escapeHtml(n.confidence)}</span><span class="title">${escapeHtml(n.node_id+' '+n.name)}</span>

    </div>
  `).join(''):'<div class="empty">暂无薄弱节点</div>';

      <div class="res">
        <span class="kind">${escapeHtml(a.dimension)}</span><span class="title">${a.count} 次 · 平均 ${Number(a.avg_score||0).toFixed(2)}</span>
        <div class="meta">${(a.examples||[]).map(x=>escapeHtml(x.qid+': '+x.feedback)).join('<br>')}</div>
      </div>
    `).join(''):'<div class="empty">暂无 feedback 薄弱维度</div>';
  }
}

    if(!r.hits.length){box.innerHTML='<div class="empty">无匹配。先建索引?</div>';return}
    box.innerHTML=r.hits.map(h=>`<div class="card" style="margin-bottom:8px">
      <div style="font-size:11px;color:var(--mut);font-family:ui-monospace,monospace">[${escapeHtml(h.doc_id)} · §${escapeHtml(h.section)} · p.${h.page}] <span style="color:var(--ok)">score ${h.score}</span></div>
      <div style="font-weight:600;margin:4px 0">${escapeHtml(h.title)}</div>
      <div style="font-size:12px;white-space:pre-wrap;color:#333">${escapeHtml(h.preview)}…</div>
    </div>`).join('');
  }catch(e){box.innerHTML='<div class="empty" style="color:var(--danger)">'+escapeHtml(e.message)+'</div>'}
}

refreshAll();
setInterval(refreshAll,60000);

</script>
</body>
</html>
